<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lanista</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- Preload critical Unity assets for faster startup -->
    <link rel="preload" href="Build/0ce7ed3b7ad99018dc98cc9c71e42dc4.loader.js" as="script">
    <link rel="preload" href="Build/37b41afa6cc1d523f4f5827bb5a723ce.framework.js.br" as="script">
    <link rel="preload" href="Build/5821a3f20fb8f06f9b995d69bb8ee656.wasm.br" as="fetch" crossorigin="">
    <link rel="preload" href="Build/10605279a9ccbdeb6161a725606ff96e.data.br" as="fetch" crossorigin="">
  </head>
  <body class="dark">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none; width:100%">
      <div id="unity-loading-bar">
        <div id="unity-logo"><img src="logo.png"></div>
        <div id="unity-progress-bar-empty" style="display: none;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>
    <script>


      const hideFullScreenButton = "true";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/0ce7ed3b7ad99018dc98cc9c71e42dc4.loader.js";
      const config = {
        dataUrl: buildUrl + "/10605279a9ccbdeb6161a725606ff96e.data.br",
        frameworkUrl: buildUrl + "/37b41afa6cc1d523f4f5827bb5a723ce.framework.js.br",
        codeUrl: buildUrl + "/5821a3f20fb8f06f9b995d69bb8ee656.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "KLIK",
        productName: "Lanista",
        productVersion: "0.0.1",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');
    var MyGameInstance = null;
      const canFullscreen = (function() {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
          ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
    {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      }
    else
    {
    canvas.style.width = "100%";
    canvas.style.height = "100%";
    }
      loadingCover.style.display = "";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
         createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) =>
    {
    MyGameInstance = unityInstance;
          loadingCover.style.display = "none";
          if (canFullscreen) {
            if (!hideFullScreenButton) {
              fullscreenButton.style.display = "";
            }
            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);


    </script>


<script>


  function SetMode(mode) //Comes from frontend, goes to game
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "SetMode", mode);
  }

  function SetMatchId(matchId) //Comes from frontend, goes to game
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "SetMatchId", matchId);
  }

  function LoadJsonGameData(jsonData) //Comes from frontend, goes to game
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "LoadJsonGameData", jsonData);
  }

  function ThrowObjectToPlayer1(objectIndex) //Comes from frontend, goes to game
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "ThrowObjectToPlayer1", objectIndex);
  }

  function ThrowObjectToPlayer2(objectIndex) //Comes from frontend, goes to game
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "ThrowObjectToPlayer2", objectIndex);
  }

  function LoadPlayer1IconUrl(url)
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "LoadPlayer1IconUrl", url);
  }

  function LoadPlayer2IconUrl(url)
  {
    if (!window.MyGameInstance) return;
    window.MyGameInstance.SendMessage("LanistaAPI", "LoadPlayer2IconUrl", url);
  }

  // Called by Unity ~2s after game is ready. Notifies parent so frontend can send match data.
  function OnSimulationReady()
  {
    console.log("[Unity To HTML] Simulation is ready!");
    try {
      if (window.parent !== window) {
        window.parent.postMessage({ type: "UNITY_SIMULATION_READY" }, "*");
      }
    } catch (e) {
      console.warn("[Unity To HTML] postMessage failed:", e);
    }
  }
</script>

  </body>
</html>
